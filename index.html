<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NabiLab — 견적 시스템</title>
<style>
  :root {
    --indigo: #4F46E5;
    --indigo-d: #3730A3;
    --indigo-l: #EEF2FF;
    --cyan: #0891B2;
    --cyan-l: #ECFEFF;
    --text: #1E1B4B;
    --muted: #6B7280;
    --radius: 20px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Pretendard', 'Malgun Gothic', sans-serif;
    background: #F0F0F8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  .header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-icon {
    width: 36px; height: 36px;
    background: var(--indigo);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .brand-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .brand-name span { color: var(--indigo); }
  .header-date {
    font-size: 12px;
    color: var(--muted);
  }

  .greeting-card {
    width: 100%;
    max-width: 480px;
    background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-d) 100%);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    margin-bottom: 24px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .greeting-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 140px; height: 140px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
  }
  .greeting-card::after {
    content: '';
    position: absolute;
    bottom: -50px; right: 40px;
    width: 180px; height: 180px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .greeting-label {
    font-size: 11px;
    opacity: 0.7;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .greeting-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .greeting-sub {
    font-size: 13px;
    opacity: 0.75;
    margin-bottom: 20px;
  }
  .stats-row {
    display: flex;
    gap: 10px;
  }
  .stat-box {
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 10px 14px;
    flex: 1;
  }
  .stat-box .val {
    font-size: 18px;
    font-weight: 700;
    display: block;
    margin-bottom: 2px;
  }
  .stat-box .lbl {
    font-size: 10px;
    opacity: 0.75;
  }

  .section-title {
    width: 100%;
    max-width: 480px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .cards {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .est-card {
    background: white;
    border-radius: var(--radius);
    padding: 22px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    cursor: pointer;
    text-decoration: none;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .est-card:active { transform: scale(0.98); }
  .est-card.interior:hover { border-color: var(--indigo); }
  .est-card.printing:hover  { border-color: var(--cyan); }

  .card-icon-wrap {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }
  .interior .card-icon-wrap { background: var(--indigo-l); }
  .printing .card-icon-wrap  { background: var(--cyan-l); }

  .card-body { flex: 1; }
  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .card-arrow {
    font-size: 22px;
    flex-shrink: 0;
  }
  .interior .card-arrow { color: var(--indigo); }
  .printing .card-arrow  { color: var(--cyan); }
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-icon">🦋</div>
    <div class="brand-name">Nabi<span>Lab</span></div>
  </div>
  <div class="header-date" id="today-date"></div>
</div>

<div class="greeting-card">
  <div class="greeting-label">QUOTE MANAGEMENT</div>
  <div class="greeting-title">견적 발행 시스템</div>
  <div class="greeting-sub">고객에게 전달할 견적서를 빠르게 생성하세요</div>
  <div class="stats-row">
    <div class="stat-box">
      <span class="val">🏠</span>
      <span class="lbl">인테리어</span>
    </div>
    <div class="stat-box">
      <span class="val">🖨️</span>
      <span class="lbl">프린팅</span>
    </div>
    <div class="stat-box">
      <span class="val">📄</span>
      <span class="lbl">PDF 자동발행</span>
    </div>
  </div>
</div>

<div class="section-title">견적서 종류 선택</div>
<div class="cards">
  <a href="/estimate_form_interior.html" class="est-card interior">
    <div class="card-icon-wrap">🏠</div>
    <div class="card-body">
      <div class="card-name">인테리어 견적서</div>
      <div class="card-desc">바닥재 · 도배 · 페인트 · 조명 · 가구 등<br>시공 품목별 자동 계산</div>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <a href="/estimate_form_printing.html" class="est-card printing">
    <div class="card-icon-wrap">🖨️</div>
    <div class="card-body">
      <div class="card-name">프린팅 견적서</div>
      <div class="card-desc">명함 · 현수막 · 리플렛 · 스티커<br>품목별 버튼 선택으로 빠른 입력</div>
    </div>
    <div class="card-arrow">→</div>
  </a>
</div>

<script>
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('today-date').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
</script>
</body>
</html>
